<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        .container{
            width: 350px;
            margin: auto;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
        }

        input{
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button{
            padding: 10px 20px;
            cursor: pointer;
        }

        h2{
            color: darkblue;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Simple Interest Calculator</h2>

    <input type="number" id="principal" placeholder="Enter Principal Amount"><br>

    <input type="number" id="rate" placeholder="Enter Rate (%)"><br>

    <input type="number" id="time" placeholder="Enter Time (Years)"><br>

    <button onclick="calculateSI()">Calculate</button>

    <h3 id="result"></h3>
</div>

<script>
function calculateSI() {
    let p = Number(document.getElementById("principal").value);
    let r = Number(document.getElementById("rate").value);
    let t = Number(document.getElementById("time").value);

    let si = (p * r * t) / 100;

    document.getElementById("result").innerHTML =
        "Simple Interest = ₹" + si;
}
</script>

</body>
</html>
